<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tüzük | Scorpion MC</title>
    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>
    <style>
        body {
            background-color: #000;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Galeri Sayfasından Alınan Header Stili */
        .gallery-header {
            text-align: center;
            margin-bottom: 2rem; /* Kitaba yer açmak için biraz azaltıldı */
            padding-top: 8rem;
        }

        .gallery-header h1 {
            font-size: 5rem;
            letter-spacing: 10px;
            margin-bottom: 1rem;
            color: #fff;
            font-family: 'Hessian', serif;
        }

        .gallery-header p {
            color: #666;
            letter-spacing: 3px;
            font-size: 1rem;
            text-transform: uppercase;
        }

        /* Kitap Sahnesi - Tam Orta */
        .book-stage {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding-bottom: 5rem;
        }

        /* Kitap Boyutu - Biraz Küçültüldü */
        #book-container {
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            visibility: hidden; /* JS yüklenene kadar */
        }

        .page { background-color: #1a1a1a; overflow: hidden; }
        .page-content {
            width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* Navigasyon Okları - Galeri Stili */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #fff;
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        #prev { left: 5%; }
        #next { right: 5%; }

        footer {
            padding: 2rem 0;
            background: #000;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .copyright {
            color: #444;
            font-size: 0.8rem;
            letter-spacing: 2px;
        }

        /* Reveal Animasyonu */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s ease-out;
        }

        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }

        @media (max-width: 768px) {
            .gallery-header h1 { font-size: 3rem; }
            .nav-btn { width: 40px; height: 40px; font-size: 1rem; }
        }
    </style>
  <script async type="module" crossorigin src="./assets/tuzuk-legacy-aYYHVIdB.js"></script>
  <link rel="modulepreload" crossorigin href="./assets/style-legacy-toXfV2aB.js">
  <link rel="stylesheet" href="./assets/mobile.css">
  <link rel="stylesheet" href="./assets/animations.css">
</head>
<body>

    <nav id="main-nav" class="scrolled">
        <div class="container nav-content">
            <a href="index.html" class="logo" style="color: white; text-decoration: none; font-weight: bold; letter-spacing: 2px;">SCORPION MC</a>
            <ul class="nav-links">
                <li><a href="index.html">Hakkımızda</a></li>
                <li><a href="galeri.html">Galeri</a></li>
                <li><a href="ekip.html">Ekip</a></li>
                <li><a href="hikaye.html">Hikaye</a></li>
                <li><a href="thec.html">TheC</a></li>
                <li><a href="tuzuk.html" class="active">Tüzük</a></li>
                <li><a href="iletisim.html">İletişim</a></li>
            </ul>
            <div class="menu-toggle">
                <span></span><span></span><span></span>
            </div>
        </div>
    </nav>

    <main>
        <div class="gallery-header">
            <h1 class="reveal">TÜZÜK</h1>
            <p class="reveal">Scorpion MC Yasaları ve İlkeleri</p>
        </div>

        <div class="book-stage">
            <div class="nav-btn" id="prev"> &lt; </div>
            <div class="nav-btn" id="next"> &gt; </div>

            <div id="book-container">
                <!-- 1 Kapak + 8 Sayfa + Arka Kapak -->
                <div class="page" data-density="hard"><div class="page-content" style="background-image:url('assets/cover.png')"></div></div>
                <div class="page"><div class="page-content" style="background-image:url('assets/page1.jpg')"></div></div>
                <div class="page"><div class="page-content" style="background-image:url('assets/page2.jpg')"></div></div>
                <div class="page"><div class="page-content" style="background-image:url('assets/page3.jpg')"></div></div>
                <div class="page"><div class="page-content" style="background-image:url('assets/page4.jpg')"></div></div>
                <div class="page"><div class="page-content" style="background-image:url('assets/page5.jpg')"></div></div>
                <div class="page"><div class="page-content" style="background-image:url('assets/page6.jpg')"></div></div>
                <div class="page"><div class="page-content" style="background-image:url('assets/page7.jpg')"></div></div>
                <div class="page"><div class="page-content" style="background-image:url('assets/page8.jpg')"></div></div>
                <div class="page" data-density="hard"><div class="page-content" style="background-image:url('assets/back.png')"></div></div>
            </div>
        </div>
    </main>

    <footer>
        <p class="copyright">© 2026 SCORPION MC. TÜM HAKLARI SAKLIDIR.</p>
    </footer>

    <script>
        window.onload = () => {
            // Kitabı %15 civarı küçülttüm (470x625)
            const pageFlip = new St.PageFlip(document.getElementById('book-container'), {
                width: 470, 
                height: 625,
                size: "fixed",
                showCover: true,
                usePortrait: false,
                flippingTime: 1000,
                drawShadow: true,
                maxShadowOpacity: 0.5
            });

            pageFlip.loadFromHTML(document.querySelectorAll('.page'));
            document.getElementById('book-container').style.visibility = 'visible';

            document.getElementById('prev').onclick = () => pageFlip.flipPrev();
            document.getElementById('next').onclick = () => pageFlip.flipNext();

            // Galeri Reveal Animasyonu
            setTimeout(() => {
                document.querySelectorAll('.reveal').forEach(el => el.classList.add('visible'));
            }, 100);
        };
    </script>
    <script>
        // Hamburger menu toggle
        const menuToggle = document.querySelector('.menu-toggle');
        const navLinks = document.querySelector('.nav-links');
        if (menuToggle && navLinks) {
            menuToggle.addEventListener('click', () => {
                menuToggle.classList.toggle('active');
                navLinks.classList.toggle('active');
            });
            document.querySelectorAll('.nav-links a').forEach(a => {
                a.addEventListener('click', () => {
                    menuToggle.classList.remove('active');
                    navLinks.classList.remove('active');
                });
            });
        }
    </script>

</body>
</html>
