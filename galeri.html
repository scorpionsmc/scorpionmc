<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri | Scorpion MC</title>
    <link rel="stylesheet" href="./assets/mobile.css">
    <link rel="stylesheet" href="./assets/animations.css">
    <style>
        body { background-color: #000; color: #fff; margin: 0; }
        .gallery-header { text-align: center; margin-bottom: 6rem; padding-top: 8rem; }
        .gallery-header h1 { font-family: 'Hessian', serif; font-size: 5rem; letter-spacing: 10px; margin-bottom: 1rem; }
        .gallery-header p { color: #888; letter-spacing: 3px; font-size: 1rem; text-transform: uppercase; }

        .gallery-container {
            column-count: 3;
            column-gap: 1.5rem;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem 8rem 2rem;
        }

        .gallery-item {
            break-inside: avoid;
            margin-bottom: 1.5rem;
            position: relative;
            overflow: hidden;
            background: #0a0a0a;
            cursor: pointer;
            transition: all 0.4s ease;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .gallery-item img {
            width: 100%;
            display: block;
            filter: contrast(1.1) brightness(0.7);
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .gallery-item:hover img {
            filter: contrast(1.2) brightness(1);
            transform: scale(1.05);
        }

        .gallery-item::after {
            content: 'GÖRÜNTÜLE';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-family: 'Hessian', serif;
            font-size: 1.2rem;
            letter-spacing: 4px;
            opacity: 0;
            transition: 0.3s;
            z-index: 2;
        }

        .gallery-item:hover::after { opacity: 1; }

        .gallery-item::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.4);
            opacity: 0;
            transition: 0.3s;
            z-index: 1;
        }

        .gallery-item:hover::before { opacity: 1; }

        /* Lightbox */
        #lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.98);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 40px;
            backdrop-filter: blur(10px);
        }

        #lightbox img {
            max-width: 90%;
            max-height: 85vh;
            box-shadow: 0 0 50px rgba(0,0,0,1);
            filter: contrast(1.1);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .close-lightbox {
            position: absolute;
            top: 40px;
            right: 40px;
            color: white;
            font-size: 3rem;
            cursor: pointer;
            font-family: serif;
        }

        #lightbox-info { margin-top: 2rem; color: #fff; font-family: 'Hessian', serif; text-align: center; width: 100%; position: absolute; bottom: 40px; }
        #lightbox-title { font-size: 2.5rem; letter-spacing: 5px; margin-bottom: .5rem; }
        #lightbox-date { color: #888; letter-spacing: 3px; font-size: 1rem; }

        @media (max-width: 1024px) { .gallery-container { column-count: 2; } }
        @media (max-width: 768px) {
            .gallery-container { column-count: 1; padding: 0 1.5rem 5rem 1rem; }
            .gallery-header h1 { font-size: 3.5rem; }
            #main-nav .nav-links { display: none; }
        }
    </style>
</head>
<body>
    <nav id="main-nav" class="scrolled">
        <div class="container nav-content">
            <a href="index.html" class="logo">SCORPION MC</a>
            <ul class="nav-links">
                <li><a href="index.html">Hakkımızda</a></li>
                <li><a href="galeri.html" class="active">Galeri</a></li>
                <li><a href="ekip.html">Ekip</a></li>
                <li><a href="hikaye.html">Hikaye</a></li>
                <li><a href="thec.html">TheC</a></li>
                <li><a href="tuzuk.html">Tüzük</a></li>
                <li><a href="iletisim.html">İletişim</a></li>
            </ul>
            <div class="menu-toggle">
                <span></span><span></span><span></span>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="gallery-header">
            <h1 class="reveal">GALERİ</h1>
            <p class="reveal">Karanlık Sokaklardan Kareler</p>
        </div>

        <div class="gallery-container" id="gallery-wrapper">
            <!-- Fotoğraflar JS ile yüklenecek -->
        </div>  
    </main>

    <!-- Admin + Butonu -->
    <a href="admin/index.html" id="admin-add-btn" style="display:none;position:fixed;bottom:40px;right:40px;width:70px;height:70px;background:#fff;color:#000;border-radius:50%;align-items:center;justify-content:center;font-size:3rem;text-decoration:none;box-shadow:0 10px 30px rgba(0,0,0,0.5);z-index:2100;transition:all 0.3s cubic-bezier(0.16,1,0.3,1);font-family:'Hessian',serif;line-height:1">
        +
    </a>

    <div id="lightbox">
        <span class="close-lightbox">&times;</span>
        <div style="text-align:center;width:100%">
            <img id="lightbox-img" src="" alt="Full View">
            <div id="lightbox-info">
                <h3 id="lightbox-title"></h3>
                <p id="lightbox-date"></p>
            </div>
        </div>
    </div>

    <footer>
        <div class="container">
            <div class="footer-logo brand-font" style="font-family:'Hessian',serif;font-size:2rem;letter-spacing:10px;text-align:center;margin-bottom:1rem;margin-top:5rem;">SCORPION MC</div>
            <p class="copyright" style="text-align:center;color:#444;font-size:0.7rem;letter-spacing:3px;padding-bottom:5rem;">© 2025 SCORPION MC. TÜM HAKLARI SAKLIDIR.</p>
        </div>
    </footer>

    <script>
        async function loadGallery() {
            const wrapper = document.getElementById('gallery-wrapper');
            try {
                const res = await fetch('https://raw.githubusercontent.com/scorpionsmc/scorpionmc/main/assets/gallery_data.json?t=' + Date.now());
                if (!res.ok) throw new Error('JSON okunamadı');
                const data = await res.json();
                wrapper.innerHTML = '';
                data.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'gallery-item reveal';
                    div.innerHTML = `<img src="${item.src}" alt="${item.title || ''}">`;
                    div.addEventListener('click', () => openLightbox(item.src, item.title, item.date));
                    wrapper.appendChild(div);
                });
            } catch (e) {
                console.error('Galeri yüklenemedi:', e);
                wrapper.innerHTML = '<p style="color:#555;text-align:center;padding:4rem;letter-spacing:2px">Fotoğraflar yüklenemedi.</p>';
            }
            // Intersection Observer
            const obs = new IntersectionObserver(entries => {
                entries.forEach(en => { if (en.isIntersecting) en.target.classList.add('visible'); });
            }, { threshold: 0.1 });
            document.querySelectorAll('.gallery-item.reveal').forEach(el => obs.observe(el));
            
            // Fallback reveal
            setTimeout(() => {
                document.querySelectorAll('.gallery-item.reveal').forEach(el => {
                    if (!el.classList.contains('visible')) el.classList.add('visible');
                });
            }, 1200);
        }

        function checkAdmin() {
            if (sessionStorage.getItem('smc_admin') === '1') {
                document.getElementById('admin-add-btn').style.display = 'flex';
            }
        }

        const lightbox = document.getElementById('lightbox');
        const closeBtn = document.querySelector('.close-lightbox');

        function openLightbox(src, title, date) {
            document.getElementById('lightbox-img').src = src;
            document.getElementById('lightbox-title').textContent = title || '';
            document.getElementById('lightbox-date').textContent = date || '';
            lightbox.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        closeBtn.addEventListener('click', () => { lightbox.style.display = 'none'; document.body.style.overflow = 'auto'; });
        lightbox.addEventListener('click', e => { if (e.target === lightbox) closeBtn.click(); });

        loadGallery();
        checkAdmin();
    </script>
    <script crossorigin id="vite-legacy-polyfill" src="./assets/polyfills-legacy-XJe6vqej.js"></script>
    <script crossorigin id="vite-legacy-entry" data-src="./assets/galeri-legacy-XDi4Fj-j.js">System.import(document.getElementById('vite-legacy-entry').getAttribute('data-src'))</script>
    <script src="./assets/animations.js" defer></script>
</body>
</html>
